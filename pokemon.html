<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD NOK - Pok&eacute;mon Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #FF3366;
            --secondary: #FFD700;
            --dark: #0a0a0a;
            --light: #ffffff;
            --gray: #1a1a1a;
            --accent: #00FFB3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== NAVIGATION ===== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, transparent 100%);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Antonio', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--light);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }

        .nav-links a:hover { color: var(--primary); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a.active { color: var(--primary); }
        .nav-links a.active::after { width: 100%; }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .menu-toggle span {
            width: 30px;
            height: 3px;
            background: var(--light);
            transition: all 0.3s;
        }

        /* ===== HERO ===== */
        .pokemon-hero {
            padding: 10rem 4rem 4rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 30% 50%, rgba(255,51,102,0.15), transparent 60%),
                        radial-gradient(circle at 70% 50%, rgba(255,215,0,0.15), transparent 60%),
                        var(--dark);
        }

        .pokemon-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
            pointer-events: none;
        }

        .section-title {
            font-family: 'Antonio', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 1rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--light), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 1s ease-out;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 1.2rem;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== POKEBALL ICON ===== */
        .pokeball-icon {
            width: 64px; height: 64px;
            margin: 0 auto 1.5rem;
            animation: spin 3s ease-in-out infinite;
        }

        @keyframes spin {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        .pokeball-icon svg { width: 100%; height: 100%; }

        /* ===== MAIN CONTAINER ===== */
        .pokemon-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 4rem 6rem;
            position: relative;
            z-index: 1;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .tab {
            flex: 1;
            padding: 1.2rem;
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tab:hover {
            background: rgba(255,255,255,0.05);
            color: var(--light);
            border-color: rgba(255,255,255,0.2);
        }

        .tab.active {
            border-color: var(--primary);
            color: var(--secondary);
            background: rgba(255,51,102,0.1);
        }

        .tab-icon { font-size: 1.5rem; display: block; margin-bottom: 0.3rem; }

        /* ===== PANELS ===== */
        .panel { display: none; animation: fadeInUp 0.4s ease; }
        .panel.active { display: block; }

        /* ===== FORM ===== */
        .input-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            color: var(--light);
            font-family: 'DM Sans', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            transition: border-color 0.3s;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary); }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }

        /* ===== UPLOAD ===== */
        .upload-area {
            border: 2px dashed rgba(255,255,255,0.1);
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.03);
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(255,51,102,0.05);
        }

        .upload-area.has-image { padding: 1rem; }
        .upload-icon { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.6; }
        .upload-text { color: rgba(255,255,255,0.5); font-size: 0.95rem; }
        .upload-text strong { color: var(--primary); }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .preview-img {
            max-width: 200px;
            max-height: 200px;
            display: none;
            margin: 0 auto;
        }

        .preview-img.visible { display: block; }

        /* ===== GENERATE BUTTON ===== */
        .generate-btn {
            width: 100%;
            padding: 1.2rem;
            font-family: 'Antonio', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), #FF1744);
            color: var(--light);
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255,51,102,0.3);
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,51,102,0.5);
        }

        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .generate-btn.loading { background: linear-gradient(135deg, #333, #222); box-shadow: none; }

        /* ===== RESULT CARD ===== */
        .result-card {
            display: none;
            margin-top: 3rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card.visible { display: block; }

        .card-header {
            padding: 2rem 2rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .pokemon-name {
            font-family: 'Antonio', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .pokemon-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 0.5rem;
        }

        .card-image-area {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: center;
            min-height: 200px;
        }

        .pokemon-art {
            font-size: 0.85rem;
            line-height: 1.1;
            font-family: 'Courier New', monospace;
            white-space: pre;
            color: var(--accent);
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-stats { padding: 0 2rem 2rem; }

        .stat-section { margin-bottom: 1.5rem; }

        .stat-section h3 {
            font-family: 'Antonio', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        .stat-section h3.strengths { color: var(--accent); }
        .stat-section h3.weaknesses { color: var(--primary); }

        .stat-bars { display: flex; flex-direction: column; gap: 0.5rem; }

        .stat-bar { display: flex; align-items: center; gap: 0.75rem; }

        .stat-label {
            width: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-align: right;
            flex-shrink: 0;
        }

        .stat-track {
            flex: 1;
            height: 10px;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            transition: width 1s ease;
            width: 0;
        }

        .stat-fill.green { background: linear-gradient(90deg, #00cc88, var(--accent)); }
        .stat-fill.red { background: linear-gradient(90deg, #cc0033, var(--primary)); }
        .stat-fill.blue { background: linear-gradient(90deg, #0066cc, #4fc3f7); }
        .stat-fill.yellow { background: linear-gradient(90deg, #cc9900, var(--secondary)); }

        .stat-value {
            width: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--light);
        }

        .pokemon-description {
            padding: 1.5rem 2rem;
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
            line-height: 1.8;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-style: italic;
        }

        .trainer-badge {
            padding: 0 2rem 2rem;
            text-align: center;
        }

        .trainer-badge span {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--secondary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* ===== TYPE COLORS ===== */
        .type-fire { background: #f57c00; color: white; }
        .type-water { background: #1976d2; color: white; }
        .type-grass { background: #388e3c; color: white; }
        .type-electric { background: #f9a825; color: #333; }
        .type-psychic { background: #e91e8c; color: white; }
        .type-ice { background: #4fc3f7; color: #333; }
        .type-dragon { background: #7b1fa2; color: white; }
        .type-dark { background: #424242; color: white; }
        .type-fairy { background: #f48fb1; color: #333; }
        .type-fighting { background: #c62828; color: white; }
        .type-ghost { background: #6a1b9a; color: white; }
        .type-steel { background: #78909c; color: white; }
        .type-normal { background: #8d6e63; color: white; }
        .type-poison { background: #7b1fa2; color: white; }
        .type-ground { background: #a1887f; color: white; }
        .type-flying { background: #64b5f6; color: #333; }
        .type-bug { background: #689f38; color: white; }
        .type-rock { background: #795548; color: white; }

        /* ===== LOADING ===== */
        .loader { display: none; text-align: center; padding: 3rem; }
        .loader.visible { display: block; }

        .loader-pokeball {
            width: 56px; height: 56px;
            margin: 0 auto 1rem;
            animation: bounce 0.6s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-12px); }
        }

        .loader-text {
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* ===== ERROR ===== */
        .error-msg {
            display: none;
            background: rgba(255,51,102,0.1);
            border: 1px solid rgba(255,51,102,0.3);
            padding: 1rem;
            margin-top: 1rem;
            color: var(--primary);
            font-weight: 600;
            text-align: center;
        }

        .error-msg.visible { display: block; }

        /* ===== FOOTER ===== */
        footer {
            background: var(--dark);
            padding: 4rem;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .footer-logo {
            font-family: 'Antonio', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        footer p {
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            nav { padding: 1.5rem 2rem; }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 70%;
                height: 100vh;
                background: var(--dark);
                flex-direction: column;
                padding: 6rem 2rem;
                gap: 2rem;
                transition: right 0.3s;
                border-left: 2px solid var(--primary);
            }

            .nav-links.active { right: 0; }
            .menu-toggle { display: flex; }

            .pokemon-hero { padding: 8rem 2rem 2rem; }
            .pokemon-container { padding: 0 2rem 4rem; }

            .section-title { font-size: clamp(2.5rem, 8vw, 4rem); }

            .tabs { flex-direction: column; }

            footer { padding: 3rem 2rem; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <a href="index.html" class="logo">GOD NOK</a>
        <button class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html" onclick="closeMenu()">Home</a></li>
            <li><a href="music.html" onclick="closeMenu()">Music</a></li>
            <li><a href="shows.html" onclick="closeMenu()">Shows</a></li>
            <li><a href="rates.html" onclick="closeMenu()">Renter</a></li>
            <li><a href="pokemon.html" class="active" onclick="closeMenu()">Pok&eacute;mon</a></li>
        </ul>
    </nav>

    <!-- Hero -->
    <section class="pokemon-hero">
        <div class="pokeball-icon">
            <svg viewBox="0 0 100 100">
                <path d="M2 50 A48 48 0 0 1 98 50" fill="#ee1515" opacity="0.8"/>
                <path d="M2 50 A48 48 0 0 0 98 50" fill="white" opacity="0.8"/>
                <line x1="2" y1="50" x2="98" y2="50" stroke="#333" stroke-width="4"/>
                <circle cx="50" cy="50" r="14" fill="white" stroke="#333" stroke-width="4"/>
                <circle cx="50" cy="50" r="7" fill="#ddd" stroke="#333" stroke-width="2"/>
            </svg>
        </div>
        <h1 class="section-title">Pok&eacute;mon Generator</h1>
        <p class="subtitle">Oppdag din unike Pok&eacute;mon basert p&aring; hvem du er!</p>
    </section>

    <!-- Main Content -->
    <div class="pokemon-container">

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('name')" id="tab-name">
                <span class="tab-icon">&#9997;&#65039;</span>
                Skriv navnet ditt
            </button>
            <button class="tab" onclick="switchTab('image')" id="tab-image">
                <span class="tab-icon">&#128248;</span>
                Last opp bilde
            </button>
        </div>

        <!-- Name panel -->
        <div class="panel active" id="panel-name">
            <div class="input-group">
                <label for="nameInput">Hva heter du?</label>
                <input type="text" id="nameInput" placeholder="Skriv inn navnet ditt..." maxlength="40">
            </div>
            <button class="generate-btn" id="btn-name" onclick="generateFromName()">
                &#9889; GENERER POK&Eacute;MON &#9889;
            </button>
        </div>

        <!-- Image panel -->
        <div class="panel" id="panel-image">
            <div class="input-group">
                <label for="imageNameInput">Hva heter du?</label>
                <input type="text" id="imageNameInput" placeholder="Skriv inn navnet ditt..." maxlength="40">
            </div>
            <div class="input-group">
                <label>Last opp et bilde av deg selv</label>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
                    <div id="uploadPlaceholder">
                        <div class="upload-icon">&#128247;</div>
                        <p class="upload-text">Dra et bilde hit eller <strong>klikk for &aring; velge</strong></p>
                    </div>
                    <img class="preview-img" id="previewImg">
                </div>
            </div>
            <button class="generate-btn" id="btn-image" onclick="generateFromImage()">
                &#9889; GENERER POK&Eacute;MON &#9889;
            </button>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <!-- Loading -->
        <div class="loader" id="loader">
            <div class="loader-pokeball">
                <svg viewBox="0 0 100 100">
                    <path d="M2 50 A48 48 0 0 1 98 50" fill="#ee1515" opacity="0.9"/>
                    <path d="M2 50 A48 48 0 0 0 98 50" fill="white" opacity="0.9"/>
                    <line x1="2" y1="50" x2="98" y2="50" stroke="#333" stroke-width="4"/>
                    <circle cx="50" cy="50" r="14" fill="white" stroke="#333" stroke-width="4"/>
                    <circle cx="50" cy="50" r="7" fill="#ddd"/>
                </svg>
            </div>
            <p class="loader-text" id="loaderText">Fanger Pok&eacute;mon...</p>
        </div>

        <!-- Result -->
        <div class="result-card" id="resultCard">
            <div class="card-header">
                <div>
                    <div class="pokemon-name" id="pokemonName"></div>
                    <div id="pokemonTypes"></div>
                </div>
            </div>
            <div class="card-image-area">
                <div class="pokemon-art" id="pokemonArt"></div>
            </div>
            <div class="card-stats">
                <div class="stat-section">
                    <h3 class="strengths">&#9876;&#65039; Styrker</h3>
                    <div class="stat-bars" id="strengthBars"></div>
                </div>
                <div class="stat-section">
                    <h3 class="weaknesses">&#128737;&#65039; Svakheter</h3>
                    <div class="stat-bars" id="weaknessBars"></div>
                </div>
            </div>
            <div class="pokemon-description" id="pokemonDesc"></div>
            <div class="trainer-badge">
                <span id="trainerBadge"></span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-logo">GOD NOK</div>
        <p>&copy; 2025 God Nok. All rights reserved.</p>
    </footer>

    <script>
        // Menu
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }
        function closeMenu() {
            document.getElementById('navLinks').classList.remove('active');
        }

        // Pokemon Generator
        let currentTab = 'name';
        let uploadedImageData = null;

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');
            hideError();
            document.getElementById('resultCard').classList.remove('visible');
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                uploadedImageData = ev.target.result.split(',')[1];
                const preview = document.getElementById('previewImg');
                preview.src = ev.target.result;
                preview.classList.add('visible');
                document.getElementById('uploadPlaceholder').style.display = 'none';
                document.getElementById('uploadArea').classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.remove('visible');
        }

        function setLoading(on, text) {
            const loader = document.getElementById('loader');
            const btnName = document.getElementById('btn-name');
            const btnImage = document.getElementById('btn-image');
            if (on) {
                loader.classList.add('visible');
                document.getElementById('loaderText').textContent = text || 'Fanger Pok\u00e9mon...';
                btnName.disabled = true;
                btnImage.disabled = true;
                btnName.classList.add('loading');
                btnImage.classList.add('loading');
                document.getElementById('resultCard').classList.remove('visible');
                hideError();
            } else {
                loader.classList.remove('visible');
                btnName.disabled = false;
                btnImage.disabled = false;
                btnName.classList.remove('loading');
                btnImage.classList.remove('loading');
            }
        }

        async function callClaude(messages) {
            const response = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "claude-sonnet-4-20250514",
                    max_tokens: 1000,
                    messages: messages,
                    system: `Du er en kreativ Pok\u00e9mon-designer. Du lager unike, originale Pok\u00e9mon basert p\u00e5 folks navn og/eller utseende.

Svar KUN med gyldig JSON (ingen markdown, ingen backticks) i dette formatet:
{
  "name": "Pok\u00e9monNavn",
  "types": ["fire", "psychic"],
  "ascii_art": "ASCII-art av pok\u00e9monen (maks 15 linjer, maks 40 tegn bred)",
  "strengths": [
    {"name": "Angrep", "value": 85},
    {"name": "Hastighet", "value": 72},
    {"name": "Spesialangrep", "value": 90}
  ],
  "weaknesses": [
    {"name": "Forsvar", "value": 35},
    {"name": "HP", "value": 42},
    {"name": "Utholdenhet", "value": 28}
  ],
  "description": "En kort, morsom beskrivelse av pok\u00e9monen og dens personlighet.",
  "trainer_title": "En tittel for treneren, f.eks. 'Mester av Flammekunst'"
}

Gyldige typer: fire, water, grass, electric, psychic, ice, dragon, dark, fairy, fighting, ghost, steel, normal, poison, ground, flying, bug, rock.

Lag alltid kreative, unike Pok\u00e9mon-navn inspirert av personens navn. ASCII-arten skal se ut som en Pok\u00e9mon. Styrker skal ha verdier mellom 60-99, svakheter mellom 20-55.`
                })
            });
            const data = await response.json();
            const text = data.content.map(i => i.text || "").join("\n").trim();
            return JSON.parse(text.replace(/```json|```/g, "").trim());
        }

        async function generateFromName() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) { showError('Skriv inn navnet ditt f\u00f8rst!'); return; }
            setLoading(true, 'Analyserer navnet ditt...');
            try {
                const pokemon = await callClaude([{
                    role: "user",
                    content: `Lag en unik Pok\u00e9mon basert p\u00e5 dette navnet: "${name}". Bruk bokstavene og lyden i navnet som inspirasjon for typen og utseendet.`
                }]);
                displayResult(pokemon, name);
            } catch (err) {
                console.error(err);
                showError('Noe gikk galt. Pr\u00f8v igjen!');
            }
            setLoading(false);
        }

        async function generateFromImage() {
            const name = document.getElementById('imageNameInput').value.trim();
            if (!name) { showError('Skriv inn navnet ditt f\u00f8rst!'); return; }
            if (!uploadedImageData) { showError('Last opp et bilde f\u00f8rst!'); return; }
            setLoading(true, 'Analyserer bildet ditt...');
            try {
                const pokemon = await callClaude([{
                    role: "user",
                    content: [
                        {
                            type: "image",
                            source: { type: "base64", media_type: "image/jpeg", data: uploadedImageData }
                        },
                        {
                            type: "text",
                            text: `Se p\u00e5 dette bildet og personen som heter "${name}". Basert p\u00e5 utseendet deres (farger, stil, uttrykk, stemning) og navnet, lag en unik Pok\u00e9mon som passer perfekt til denne personen.`
                        }
                    ]
                }]);
                displayResult(pokemon, name);
            } catch (err) {
                console.error(err);
                showError('Noe gikk galt. Pr\u00f8v igjen!');
            }
            setLoading(false);
        }

        function displayResult(pokemon, trainerName) {
            document.getElementById('pokemonName').textContent = pokemon.name;

            const typesEl = document.getElementById('pokemonTypes');
            typesEl.innerHTML = '';
            (pokemon.types || []).forEach(t => {
                const span = document.createElement('span');
                span.className = `pokemon-type type-${t}`;
                span.textContent = t.toUpperCase();
                typesEl.appendChild(span);
            });

            document.getElementById('pokemonArt').textContent = pokemon.ascii_art || '(\u256F\u00B0\u25A1\u00B0)\u256F\uFE35 \u253B\u2501\u253B';

            const strengthBars = document.getElementById('strengthBars');
            strengthBars.innerHTML = '';
            (pokemon.strengths || []).forEach((s, i) => {
                const colors = ['green', 'blue', 'yellow'];
                strengthBars.innerHTML += `
                    <div class="stat-bar">
                        <span class="stat-label">${s.name}</span>
                        <div class="stat-track"><div class="stat-fill ${colors[i % 3]}" id="str-${i}" style="width:0%"></div></div>
                        <span class="stat-value">${s.value}</span>
                    </div>`;
            });

            const weaknessBars = document.getElementById('weaknessBars');
            weaknessBars.innerHTML = '';
            (pokemon.weaknesses || []).forEach((w, i) => {
                weaknessBars.innerHTML += `
                    <div class="stat-bar">
                        <span class="stat-label">${w.name}</span>
                        <div class="stat-track"><div class="stat-fill red" id="weak-${i}" style="width:0%"></div></div>
                        <span class="stat-value">${w.value}</span>
                    </div>`;
            });

            document.getElementById('pokemonDesc').textContent = pokemon.description || '';
            document.getElementById('trainerBadge').textContent =
                `\uD83C\uDFC6 Trener ${trainerName} \u2014 ${pokemon.trainer_title || 'Pok\u00e9mon-mester'}`;

            document.getElementById('resultCard').classList.add('visible');

            setTimeout(() => {
                (pokemon.strengths || []).forEach((s, i) => {
                    const el = document.getElementById('str-' + i);
                    if (el) el.style.width = s.value + '%';
                });
                (pokemon.weaknesses || []).forEach((w, i) => {
                    const el = document.getElementById('weak-' + i);
                    if (el) el.style.width = w.value + '%';
                });
            }, 100);

            setTimeout(() => {
                document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 200);
        }

        // Drag and drop
        const uploadArea = document.getElementById('uploadArea');
        ['dragenter', 'dragover'].forEach(ev => {
            uploadArea.addEventListener(ev, e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        });
        ['dragleave', 'drop'].forEach(ev => {
            uploadArea.addEventListener(ev, e => { e.preventDefault(); uploadArea.classList.remove('dragover'); });
        });
        uploadArea.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                document.getElementById('fileInput').files = e.dataTransfer.files;
                handleFileSelect({ target: { files: e.dataTransfer.files } });
            }
        });

        // Enter key
        document.getElementById('nameInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') generateFromName();
        });
        document.getElementById('imageNameInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') generateFromImage();
        });
    </script>
</body>
</html>
