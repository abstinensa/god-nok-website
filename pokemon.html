<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Din Pokémon</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a28;
      --border: #2a2a40;
      --accent: #f7c948;
      --accent2: #ff6b6b;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --fire: #ff6b35;
      --water: #4fc3f7;
      --grass: #66bb6a;
      --electric: #ffee58;
      --psychic: #f06292;
      --ice: #80deea;
      --dragon: #7e57c2;
      --dark: #546e7a;
      --fairy: #f48fb1;
      --normal: #bdbdbd;
      --fighting: #ef5350;
      --flying: #90caf9;
      --poison: #ab47bc;
      --ground: #d4a574;
      --rock: #a1887f;
      --bug: #9ccc65;
      --ghost: #5c6bc0;
      --steel: #78909c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 60% 40%, rgba(247,201,72,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 80%, rgba(255,107,107,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    header {
      text-align: center;
    }

    .eyebrow {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: var(--accent);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0.8;
    }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      line-height: 1.6;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .input-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.5rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder {
      color: var(--muted);
      font-weight: 300;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(247,201,72,0.1);
    }

    button {
      width: 100%;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 12px;
      padding: 1.1rem;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
      box-shadow: 0 4px 20px rgba(247,201,72,0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(247,201,72,0.45);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 2px 10px rgba(247,201,72,0.2);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Card */
    .card {
      width: 100%;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .card.visible {
      display: flex;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--type-color, var(--accent));
    }

    .pokemon-number {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      align-self: flex-start;
    }

    .pokemon-img-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
    }

    .pokemon-img-bg {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(247,201,72,0.08) 0%, transparent 70%);
    }

    .pokemon-img {
      width: 180px;
      height: 180px;
      image-rendering: pixelated;
      object-fit: contain;
      position: relative;
      z-index: 1;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .pokemon-name {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      color: var(--text);
      text-align: center;
      text-transform: uppercase;
    }

    .name-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 300;
      text-align: center;
    }

    .types {
      display: flex;
      gap: 0.6rem;
    }

    .type-badge {
      padding: 0.35rem 0.9rem;
      border-radius: 99px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      background: var(--type-bg, #555);
    }

    .stats {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 80px 1fr 40px;
      align-items: center;
      gap: 0.8rem;
    }

    .stat-name {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-bar-bg {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .stat-bar {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transform-origin: left;
      animation: growBar 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes growBar {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    .stat-value {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: var(--text);
      text-align: right;
    }

    /* Loading */
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2rem;
    }

    .loading.visible { display: flex; }

    .pokeball {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ff6b6b 50%, #fff 50%);
      border: 3px solid #333;
      position: relative;
      animation: spin 0.8s linear infinite;
    }

    .pokeball::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #333;
      z-index: 1;
    }

    .pokeball::after {
      content: '';
      position: absolute;
      top: calc(50% - 1.5px);
      left: 0; right: 0;
      height: 3px;
      background: #333;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    .error {
      display: none;
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.3);
      border-radius: 10px;
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      color: var(--accent2);
      text-align: center;
    }

    .error.visible { display: block; }

    footer {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      font-weight: 300;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <p class="eyebrow">✦ Pokémon-finder ✦</p>
    <h1>Hvem er <span>din</span><br>Pokémon?</h1>
  </header>

  <div class="input-section">
    <div class="input-wrapper">
      <input type="text" id="nameInput" placeholder="Skriv inn navnet ditt..." autocomplete="off" />
    </div>
    <button id="findBtn" onclick="findPokemon()">FINN MIN POKÉMON</button>
  </div>

  <div class="loading" id="loading">
    <div class="pokeball"></div>
    <p class="loading-text">Henter Pokémon...</p>
  </div>

  <div class="error" id="error"></div>

  <div class="card" id="card">
    <p class="pokemon-number" id="pokemonNumber">#000</p>
    <div class="pokemon-img-wrapper">
      <div class="pokemon-img-bg"></div>
      <img class="pokemon-img" id="pokemonImg" src="" alt="" />
    </div>
    <div>
      <p class="name-label" id="nameLabel"></p>
      <p class="pokemon-name" id="pokemonName"></p>
    </div>
    <div class="types" id="types"></div>
    <div class="stats" id="stats"></div>
  </div>

  <footer>
    Data fra <a href="https://pokeapi.co" target="_blank">PokéAPI</a> · abstinensa.no
  </footer>
</div>

<script>
  const TYPE_COLORS = {
    fire: '#ff6b35', water: '#4fc3f7', grass: '#66bb6a',
    electric: '#ffee58', psychic: '#f06292', ice: '#80deea',
    dragon: '#7e57c2', dark: '#546e7a', fairy: '#f48fb1',
    normal: '#bdbdbd', fighting: '#ef5350', flying: '#90caf9',
    poison: '#ab47bc', ground: '#d4a574', rock: '#a1887f',
    bug: '#9ccc65', ghost: '#5c6bc0', steel: '#78909c',
    unknown: '#888', shadow: '#888'
  };

  const STAT_NAMES = {
    hp: 'HP', attack: 'Angrep', defense: 'Forsvar',
    'special-attack': 'Sp.angrep', 'special-defense': 'Sp.forsvar', speed: 'Fart'
  };

  function hashName(name) {
    const clean = name.trim().toLowerCase();
    if (!clean) return 0;
    let hash = 0;
    for (let i = 0; i < clean.length; i++) {
      hash = (hash * 31 + clean.charCodeAt(i)) >>> 0;
    }
    return (hash % 898) + 1; // Pokémon #1–898
  }

  async function findPokemon() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) {
      document.getElementById('nameInput').focus();
      return;
    }

    const card = document.getElementById('card');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const btn = document.getElementById('findBtn');

    card.classList.remove('visible');
    error.classList.remove('visible');
    loading.classList.add('visible');
    btn.disabled = true;

    const id = hashName(name);

    try {
      const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
      if (!res.ok) throw new Error('Fant ikke Pokémon');
      const data = await res.json();

      // Image
      const img = data.sprites?.other?.['official-artwork']?.front_default
                || data.sprites?.front_default;
      document.getElementById('pokemonImg').src = img;
      document.getElementById('pokemonImg').alt = data.name;

      // Number & name
      document.getElementById('pokemonNumber').textContent = `#${String(data.id).padStart(3,'0')}`;
      document.getElementById('pokemonName').textContent = data.name;
      document.getElementById('nameLabel').textContent = `${name}s Pokémon`;

      // Types
      const typesEl = document.getElementById('types');
      typesEl.innerHTML = '';
      const primaryType = data.types[0]?.type?.name || 'normal';
      const typeColor = TYPE_COLORS[primaryType] || '#888';
      card.style.setProperty('--type-color', typeColor);

      data.types.forEach(t => {
        const badge = document.createElement('span');
        badge.className = 'type-badge';
        badge.textContent = t.type.name;
        badge.style.background = TYPE_COLORS[t.type.name] || '#555';
        typesEl.appendChild(badge);
      });

      // Stats
      const statsEl = document.getElementById('stats');
      statsEl.innerHTML = '';
      data.stats.forEach((s, i) => {
        const label = STAT_NAMES[s.stat.name] || s.stat.name;
        const pct = Math.min(100, (s.base_stat / 200) * 100);
        statsEl.innerHTML += `
          <div class="stat-row">
            <span class="stat-name">${label}</span>
            <div class="stat-bar-bg">
              <div class="stat-bar" style="width:${pct}%; animation-delay:${i*0.08}s; background:${typeColor}"></div>
            </div>
            <span class="stat-value">${s.base_stat}</span>
          </div>`;
      });

      loading.classList.remove('visible');
      card.classList.add('visible');

    } catch (e) {
      loading.classList.remove('visible');
      error.textContent = 'Noe gikk galt. Prøv igjen!';
      error.classList.add('visible');
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') findPokemon();
  });
</script>
</body>
</html>
