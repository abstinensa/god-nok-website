<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD NOK - Pokémon Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF3366;
            --secondary: #FFD700;
            --dark: #0a0a0a;
            --light: #ffffff;
            --gray: #1a1a1a;
            --accent: #00FFB3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--light);
            overflow-x: hidden;
            min-height: 100vh;
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, transparent 100%);
            backdrop-filter: blur(10px);
        }
        .logo {
            font-family: 'Antonio', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 3rem; list-style: none; }
        .nav-links a {
            color: var(--light);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            transition: color 0.3s;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a.active { color: var(--primary); }
        .nav-links a.active::after { width: 100%; }
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .menu-toggle span {
            width: 30px;
            height: 3px;
            background: var(--light);
            transition: all 0.3s;
        }
        .pokemon-hero {
            padding: 10rem 4rem 4rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 30% 50%, rgba(255,51,102,0.15), transparent 60%),
                        radial-gradient(circle at 70% 50%, rgba(255,215,0,0.15), transparent 60%),
                        var(--dark);
        }
        .pokemon-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
            pointer-events: none;
        }
        .section-title {
            font-family: 'Antonio', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 1rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--light), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 1s ease-out;
        }
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 1.2rem;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out 0.2s both;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pokeball-icon {
            width: 64px; height: 64px;
            margin: 0 auto 1.5rem;
            animation: spin 3s ease-in-out infinite;
        }
        @keyframes spin {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }
        .pokeball-icon svg { width: 100%; height: 100%; }
        .pokemon-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 4rem 6rem;
            position: relative;
            z-index: 1;
        }
        .generate-btn {
            display: inline-block;
            padding: 1.2rem 3rem;
            background: linear-gradient(135deg, var(--primary), #cc0044);
            color: white;
            font-family: 'Antonio', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255,51,102,0.4);
        }
        footer {
            background: var(--dark);
            padding: 4rem;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .footer-logo {
            font-family: 'Antonio', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        footer p { color: rgba(255,255,255,0.4); font-size: 0.9rem; }
        @media (max-width: 768px) {
            nav { padding: 1.5rem 2rem; }
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 70%;
                height: 100vh;
                background: var(--dark);
                flex-direction: column;
                padding: 6rem 2rem;
                gap: 2rem;
                transition: right 0.3s;
                border-left: 2px solid var(--primary);
            }
            .nav-links.active { right: 0; }
            .menu-toggle { display: flex; }
            .pokemon-hero { padding: 8rem 2rem 2rem; }
            .pokemon-container { padding: 0 2rem 4rem; }
            .section-title { font-size: clamp(2.5rem, 8vw, 4rem); }
            footer { padding: 3rem 2rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">GOD NOK</a>
        <button class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html" onclick="closeMenu()">Home</a></li>
            <li><a href="music.html" onclick="closeMenu()">Music</a></li>
            <li><a href="shows.html" onclick="closeMenu()">Shows</a></li>
            <li><a href="rates.html" onclick="closeMenu()">Renter</a></li>
            <li><a href="pokemon.html" class="active" onclick="closeMenu()">Pok&eacute;mon</a></li>
        </ul>
    </nav>

    <section class="pokemon-hero">
        <div class="pokeball-icon">
            <svg viewBox="0 0 100 100">
                <path d="M2 50 A48 48 0 0 1 98 50" fill="#ee1515" opacity="0.8"/>
                <path d="M2 50 A48 48 0 0 0 98 50" fill="white" opacity="0.8"/>
                <line x1="2" y1="50" x2="98" y2="50" stroke="#333" stroke-width="4"/>
                <circle cx="50" cy="50" r="14" fill="white" stroke="#333" stroke-width="4"/>
                <circle cx="50" cy="50" r="7" fill="#ddd" stroke="#333" stroke-width="2"/>
            </svg>
        </div>
        <h1 class="section-title">Pok&eacute;mon Generator</h1>
        <p class="subtitle">Oppdag din unike Pok&eacute;mon basert p&aring; hvem du er!</p>
    </section>

    <div class="pokemon-container" style="text-align: center; padding-top: 2rem; padding-bottom: 6rem;">
        <a href="https://poke-me-ify.lovable.app" target="_blank" rel="noopener" class="generate-btn">
            &#127918; START POK&Eacute;MON GENERATOR
        </a>
        <p style="color: rgba(255,255,255,0.4); margin-top: 1.5rem; font-size: 0.9rem;">&Aring;pnes i en ny fane</p>
    </div>

    <footer>
        <div class="footer-logo">GOD NOK</div>
        <p>&copy; 2025 God Nok. All rights reserved.</p>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }
        function closeMenu() {
            document.getElementById('navLinks').classList.remove('active');
        }
    </script>
</body>
</html>
